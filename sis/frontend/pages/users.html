<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Users — SIS</title>
  <link rel="stylesheet" href="../css/style.css">
</head>
<body>
<div class="app-shell">
  <div id="sidebar-container"></div>

  <div class="main-content">
    <header class="topbar">
      <div class="topbar-left">
        <button class="hamburger" id="hamburger"><span></span><span></span><span></span></button>
        <div>
          <div class="topbar-title">Users</div>
          <div class="topbar-breadcrumb">Home › Administration › User Management</div>
        </div>
      </div>
      <div class="topbar-right">
        <div class="topbar-search">
          <span class="search-icon">🔍</span>
          <input type="text" id="global-search" placeholder="Search users…">
        </div>
      </div>
    </header>

    <main class="page-content">
      <div class="page-header">
        <div class="page-header-left">
          <h2>User Management</h2>
          <p>Add, edit, and manage user accounts and roles</p>
        </div>
        <button class="btn btn-primary" onclick="openModal('user-modal')">➕ Add User</button>
      </div>

      <!-- Filter bar -->
      <div class="filter-bar">
        <input type="text" class="form-control" id="search-input" placeholder="🔍 Search by name, username, email…">
        <select class="form-control form-select" id="role-filter">
          <option value="">All Roles</option>
          <option value="ADMIN">Admin</option>
          <option value="FACULTY">Faculty</option>
          <option value="STUDENT">Student</option>
        </select>
        <button class="btn btn-outline btn-sm" onclick="loadUsers()">🔄 Refresh</button>
      </div>

      <!-- Table -->
      <div class="card">
        <div class="card-header">
          <h3>All Users</h3>
          <span id="user-count" style="font-size:.85rem;color:var(--text-muted)"></span>
        </div>
        <div class="table-wrapper">
          <table>
            <thead>
              <tr>
                <th>User</th>
                <th>Username</th>
                <th>Email</th>
                <th>Role</th>
                <th>Status</th>
                <th>Actions</th>
              </tr>
            </thead>
            <tbody id="user-tbody">
              <tr><td colspan="6"><div class="loading-overlay"><div class="spinner"></div></div></td></tr>
            </tbody>
          </table>
        </div>
      </div>
    </main>
  </div>
</div>

<!-- Add/Edit User Modal -->
<div class="modal-overlay" id="user-modal">
  <div class="modal">
    <div class="modal-header">
      <h3 id="modal-title">Add New User</h3>
      <button class="modal-close" onclick="closeModal('user-modal')">✕</button>
    </div>
    <div class="modal-body">
      <form id="user-form">
        <input type="hidden" id="user-id">
        <div class="form-grid-2">
          <div class="form-group span-2">
            <label>Full Name *</label>
            <input type="text" class="form-control" id="u-fullname" required placeholder="John Doe">
          </div>
          <div class="form-group">
            <label>Username *</label>
            <input type="text" class="form-control" id="u-username" required placeholder="johndoe">
          </div>
          <div class="form-group">
            <label>Email *</label>
            <input type="email" class="form-control" id="u-email" required placeholder="john@example.com">
          </div>
          <div class="form-group">
            <label>Role *</label>
            <select class="form-control form-select" id="u-role" required>
              <option value="STUDENT">Student</option>
              <option value="FACULTY">Faculty</option>
              <option value="ADMIN">Admin</option>
            </select>
          </div>
          <div class="form-group">
            <label>Password <span id="pwd-hint"></span></label>
            <input type="password" class="form-control" id="u-password" placeholder="Leave blank to keep current">
          </div>
          
          <!-- Student profile fields, hidden if role != STUDENT -->
          <div id="student-fields" style="display: grid; gap: 1.5rem;" class="span-2 form-grid-2">
             <div class="form-group">
               <label>Department *</label>
               <select class="form-control form-select" id="u-department">
                 <option value="">— Select Department —</option>
               </select>
             </div>
             <div class="form-group">
               <label>Year of Study *</label>
               <select class="form-control form-select" id="u-year">
                 <option value="1">Year 1</option>
                 <option value="2">Year 2</option>
                 <option value="3">Year 3</option>
                 <option value="4">Year 4</option>
               </select>
             </div>
          </div>
        </div>
      </form>
    </div>
    <div class="modal-footer">
      <button class="btn btn-outline" onclick="closeModal('user-modal')">Cancel</button>
      <button class="btn btn-primary" id="save-user-btn" onclick="saveUser()">Save User</button>
    </div>
  </div>
</div>

<div id="toast-container"></div>
<script src="../js/api.js"></script>
<script>
  // Admin only
  if (!Auth.isLoggedIn()) {
    window.location.href = '../index.html';
  } else if (Auth.getRole() !== 'ADMIN') {
    window.location.href = 'dashboard.html';
  }

  fetch('_sidebar.html').then(r=>r.text()).then(h=>{ document.getElementById('sidebar-container').innerHTML=h; initSidebar(); });

  let allUsers = [];

  async function loadUsers() {
    showLoading('user-tbody');
    try {
      allUsers = await API.users.getAll();
      renderTable(allUsers);
    } catch(err) { toast(err.message, 'error'); }
  }

  function renderTable(users) {
    document.getElementById('user-count').textContent = `${users.length} records`;
    const tbody = document.getElementById('user-tbody');
    if (!users.length) {
      tbody.innerHTML = '<tr><td colspan="6"><div class="empty-state"><div class="empty-icon">👥</div><h3>No users found</h3></div></td></tr>';
      return;
    }
    tbody.innerHTML = users.map(u => `
      <tr>
        <td>
          <div class="avatar-cell">
            <div class="table-avatar">${initials(u.fullName)}</div>
            <div>
              <div style="font-weight:600">${u.fullName}</div>
            </div>
          </div>
        </td>
        <td><code style="background:var(--ivory);padding:.15rem .4rem;border-radius:4px;font-size:.82rem">${u.username}</code></td>
        <td>${u.email || '—'}</td>
        <td>${statusBadge(u.role)}</td>
        <td>${statusBadge(u.active ? 'ACTIVE' : 'DROPPED')}</td>
        <td>
          <div class="table-actions">
            <button class="btn btn-outline btn-sm" onclick="editUser(${u.id})">✏️</button>
            ${u.id != Auth.getUserId() ? `<button class="btn btn-sm" style="background:var(--danger-bg);color:var(--danger)" onclick="deleteUser(${u.id})">🗑</button>` : ''}
          </div>
        </td>
      </tr>`).join('');
  }

  // Search + filter
  function applyFilters() {
    const q    = document.getElementById('search-input').value.toLowerCase();
    const role = document.getElementById('role-filter').value;
    const filtered = allUsers.filter(u => {
      const matchQ    = !q    || `${u.fullName} ${u.username} ${u.email}`.toLowerCase().includes(q);
      const matchRole = !role || String(u.role) === role;
      return matchQ && matchRole;
    });
    renderTable(filtered);
  }

  document.getElementById('search-input').addEventListener('input', debounce(applyFilters));
  document.getElementById('global-search').addEventListener('input', debounce(e => {
    document.getElementById('search-input').value = e.target.value; applyFilters();
  }));
  document.getElementById('role-filter').addEventListener('change', applyFilters);

  // Edit
  function editUser(id) {
    const u = allUsers.find(x => x.id === id);
    if (!u) return;
    document.getElementById('modal-title').textContent = 'Edit User';
    document.getElementById('user-id').value   = u.id;
    document.getElementById('u-fullname').value  = u.fullName;
    document.getElementById('u-username').value   = u.username;
    document.getElementById('u-email').value      = u.email;
    document.getElementById('u-role').value       = u.role;
    document.getElementById('pwd-hint').textContent = '(Leave blank to keep existing)';
    document.getElementById('u-password').required = false;
    document.getElementById('u-password').value = '';
    
    // Prevent changing own role if admin
    document.getElementById('u-role').disabled = (u.id == Auth.getUserId());
    
    // Hide student fields on edit for now (or populate them if needed, but keeping simple)
    const studentFields = document.getElementById('student-fields');
    if (studentFields) studentFields.style.display = 'none';
    
    openModal('user-modal');
  }

  // Handle role change to show student fields
  document.getElementById('u-role').addEventListener('change', function(e) {
    const isStudent = e.target.value === 'STUDENT';
    const studentFields = document.getElementById('student-fields');
    if(studentFields) {
      studentFields.style.display = isStudent ? 'grid' : 'none';
      document.getElementById('u-department').required = isStudent;
      document.getElementById('u-year').required = isStudent;
    }
  });

  // Save (create or update)
  async function saveUser() {
    if (!document.getElementById('user-form').checkValidity()) {
        document.getElementById('user-form').reportValidity();
        return;
    }
    
    const id = document.getElementById('user-id').value;
    const pwd = document.getElementById('u-password').value.trim();
    
    const payload = {
      fullName: document.getElementById('u-fullname').value.trim(),
      username: document.getElementById('u-username').value.trim(),
      email:    document.getElementById('u-email').value.trim(),
      role:     document.getElementById('u-role').value,
    };
    
    if (pwd) {
        payload.password = pwd;
    }

    const btn = document.getElementById('save-user-btn');
    btn.disabled = true; btn.textContent = 'Saving…';
    try {
      if (id) {
        await API.users.update(id, payload);
        toast('User updated successfully', 'success');
      } else {
        if (!pwd) throw new Error("Password is required for new users");
        const createdUser = await API.users.create(payload);
        
        // If Student, also create Student Profile
        if (payload.role === 'STUDENT') {
          const parts = payload.fullName.split(' ');
          const fName = parts[0];
          const lName = parts.length > 1 ? parts.slice(1).join(' ') : 'Student';
          
          const studentPayload = {
             user: { id: createdUser.id },
             firstName: fName,
             lastName: lName,
             email: payload.email,
             department: { id: parseInt(document.getElementById('u-department').value) },
             yearOfStudy: parseInt(document.getElementById('u-year').value)
          };
          try {
             await API.students.create(studentPayload);
          } catch(se) {
             console.error("Failed to create student profile:", se);
             toast('User created, but student profile failed. Check details.', 'warning');
          }
        }
        
        toast('User added successfully', 'success');
      }
      closeModal('user-modal');
      resetForm();
      loadUsers();
    } catch(err) { toast(err.message, 'error'); }
    btn.disabled = false; btn.textContent = 'Save User';
  }

  // Delete
  async function deleteUser(id) {
    if (!confirm('Deactivate this user?')) return;
    try {
      await API.users.delete(id);
      toast('User deactivated', 'warning');
      loadUsers();
    } catch(err) { toast(err.message, 'error'); }
  }

  function resetForm() {
    document.getElementById('user-form').reset();
    document.getElementById('user-id').value = '';
    document.getElementById('modal-title').textContent = 'Add New User';
    document.getElementById('pwd-hint').textContent = '*';
    document.getElementById('u-password').required = true;
    document.getElementById('u-role').disabled = false;
    
    const studentFields = document.getElementById('student-fields');
    if (studentFields) {
      studentFields.style.display = 'grid'; // Default role is STUDENT
      document.getElementById('u-department').required = true;
      document.getElementById('u-year').required = true;
    }
  }

  document.getElementById('user-modal').querySelector('.modal-overlay')?.addEventListener('click', resetForm);

  // Hardcode departments matching database for simplicity
  const defaultDepts = [
    {id:1,name:'Computer Science & Engineering',code:'CSE'},
    {id:2,name:'Electronics & Communication',code:'ECE'},
    {id:3,name:'Mechanical Engineering',code:'MECH'},
    {id:4,name:'Civil Engineering',code:'CIVIL'},
    {id:5,name:'Information Technology',code:'IT'}
  ];
  function populateDepts() {
    const el = document.getElementById('u-department');
    defaultDepts.forEach(d => {
      const o = document.createElement('option');
      o.value = d.id; o.textContent = d.name;
      el.appendChild(o);
    });
  }
  populateDepts();

  // Setup form
  resetForm();
  loadUsers();
</script>
</body>
</html>

# ─── Server ───────────────────────────────────────────────────────────────────
server.port=8080
server.servlet.context-path=/api

# ─── Datasource ───────────────────────────────────────────────────────────────
spring.datasource.url=jdbc:postgresql://localhost:5432/sis_db
spring.datasource.username=postgres
spring.datasource.password=elan7771
spring.datasource.driver-class-name=org.postgresql.Driver

# ─── JPA / Hibernate ──────────────────────────────────────────────────────────
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.format_sql=true
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.PostgreSQLDialect

# ─── JWT ──────────────────────────────────────────────────────────────────────
sis.jwt.secret=SISSecretKey2024VeryLongAndSecureKeyForProductionUse!
sis.jwt.expiration=86400000

# ─── CORS ─────────────────────────────────────────────────────────────────────
sis.cors.allowed-origins=http://localhost:3000,http://127.0.0.1:5500,http://localhost:5500

# ─── Logging ──────────────────────────────────────────────────────────────────
logging.level.com.sis=DEBUG
logging.level.org.springframework.security=INFO
